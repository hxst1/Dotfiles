env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Tema unificado Qt + cursor
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24

# SSH: agente gcr-ssh-agent (gnome-keyring); passphrases en el llavero de login
env = SSH_AUTH_SOCK,/run/user/1000/gcr/ssh
env = SSH_ASKPASS,/usr/lib/gcr4-ssh-askpass
env = SSH_ASKPASS_REQUIRE,prefer

monitor=DP-1,1920x1080@239.96,0x0,1

$terminal = kitty
$menu = wofi --show drun

exec-once = waybar

input {
    kb_layout = es
    follow_mouse = 1
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 1
    col.active_border = rgba(c9a8d4dd) rgba(b388c4dd) 45deg
    col.inactive_border = rgba(4a3d5466)
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

$mainMod = SUPER
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive
bind = $mainMod, M, exit
bind = $mainMod, R, exec, $menu
bind = $mainMod, V, togglefloating
bind = $mainMod, F, fullscreen

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
exec-once = hyprpaper & sleep 2 && hyprctl hyprpaper wallpaper "DP-1,/home/eya/.config/wallpapers/tokyo.jpg"
bind = $mainMod, L, exec, hyprlock
exec-once = hypridle
# Cargar claves SSH al iniciar sesión (ksshaskpass las saca del llavero, sin teclear)
exec-once = /home/eya/.ssh/load-keys.sh

# Mantiene vivo el portapapeles aunque se cierre la app que copió (p. ej. swappy):
# en Wayland el portapapeles lo sirve el proceso que copió; sin esto, al cerrar
# swappy tras darle a "copiar" el contenido se perdía.
exec-once = wl-clip-persist --clipboard regular

# Historial de portapapeles: vigila copias y las guarda en cliphist
exec-once = wl-paste --watch cliphist store

# ===== Capturas de pantalla =====
# Región -> abre swappy para anotar/recortar y luego guardar o copiar
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -
# Pantalla completa directa al portapapeles
bind = , Print, exec, grim - | wl-copy

# ===== Portapapeles (historial) =====
bind = $mainMod SHIFT, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# ===== Cuentagotas de color (copia el color al portapapeles) =====
bind = $mainMod SHIFT, C, exec, hyprpicker -a

# ===== Notas rápidas =====
bind = $mainMod, N, exec, /home/eya/.config/hypr/scripts/notas.sh

# ===== Guía de atajos =====
bind = $mainMod SHIFT, H, exec, /home/eya/.local/bin/teclas

# ===== Terminal desplegable (pyprland, estilo Quake) =====
exec-once = pypr
bind = $mainMod, T, exec, /home/eya/.config/hypr/scripts/pypr-toggle.sh term

# ===== Claude Code desplegable =====
bind = $mainMod, A, exec, /home/eya/.config/hypr/scripts/pypr-toggle.sh claude

# ===== Automontaje de USB/discos (icono en la bandeja de waybar) =====
exec-once = udiskie --tray

# ===== Mover la ventana de sitio dentro del workspace =====
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# ===== Redimensionar la ventana activa (mantén pulsado para repetir) =====
binde = $mainMod CTRL, left, resizeactive, -40 0
binde = $mainMod CTRL, right, resizeactive, 40 0
binde = $mainMod CTRL, up, resizeactive, 0 -40
binde = $mainMod CTRL, down, resizeactive, 0 40

# ===== Teclas multimedia =====
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
