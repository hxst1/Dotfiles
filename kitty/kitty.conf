# === Fuente ===
font_family      JetBrainsMono Nerd Font
font_size        12.0
bold_font        auto
italic_font      auto
bold_italic_font auto

# === Shell ===
shell /usr/bin/zsh

# === Ventana ===
window_padding_width 12
background_opacity 0.85
confirm_os_window_close 0
hide_window_decorations yes

# === Cursor ===
cursor_shape       beam
cursor_blink_interval 0.5

# === Scrollback ===
scrollback_lines 10000

# === Paleta Sakura ===
foreground  #f0e6e0
background  #1a1622
cursor      #c9a8d4
cursor_text_color #1a1622

# Selección
selection_foreground #1a1622
selection_background #c9a8d4

# URL
url_color #e8b88a

# === Colores del terminal (16 colores) ===
# negro
color0  #2a2435
color8  #4a3d54
# rojo
color1  #d47a9a
color9  #e89ab5
# verde
color2  #a8c9a0
color10 #bdd9b5
# amarillo / dorado
color3  #e8b88a
color11 #f0cba5
# azul / lila
color4  #b388c4
color12 #c9a8d4
# magenta
color5  #c98ad4
color13 #d9a8e0
# cyan
color6  #a8c4d4
color14 #bdd5e0
# blanco
color7  #f0e6e0
color15 #ffffff

# === Tabs ===
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
active_tab_foreground   #1a1622
active_tab_background   #c9a8d4
inactive_tab_foreground #f0e6e0
inactive_tab_background #4a3d54
allow_remote_control yes
